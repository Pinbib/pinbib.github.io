<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,500;1,500&display=swap"
        rel="stylesheet">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <title>Search github</title>
</head>

<body>
    <header>
        <span class="btn-header" id="btn_history">History</span>
        <span class="btn-header" id="btn_save">Save</span>
        <span class="btn-header" id="btn_open">Open</span>
        <span class="btn-header" id="btn_followers">Followers</span>
        <span class="btn-header" id="btn_repos">Repos</span>

        <span class="search">
            <input type="text" class="search-input" id="search_input" placeholder="Search...">
            <span class="btn-search" id="btn_search">
                <svg xmlns="http://www.w3.org/2000/svg" height="14" viewBox="0 -960 960 960" width="14">
                    <path
                        d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                </svg>
            </span>
        </span>
    </header>
    <main>
        <div class="profile">
            <img src="../favicon.ico" alt="IMG" class="img-avatar" id="img_avatar"><br>
            <div class="profile-info">
                <span class="username" id="username">Name</span><br>
                <span class="bio" id="bio">Bio</span><br>
                <div class="blog-and-company">
                    <a href="./" target="_blank" class="blog" id="blog">Blog</a>
                    <span class="company" id="company">Company</span>
                </div>
                <div class="repos-and-email">
                    <span class="repos">Repositories: <span class="repos-num" id="repos_num">{num}</span></span>
                    <span class="e-mail" id="e_mail">E-mail</span>
                </div>
                <span class="follos">Followers: <span class="follos-num" id="follos_num">{num}</span></span>
            </div>
        </div>

        <div class="repositories" id="repositories">
            <span>Repositories:</span><br>
            <!-- <div class="rep-card">
                <a href="./" target="_blank" class="rep-name">Name</a>
            </div> -->
        </div>
        <div class="followers" id="followers">
            <span>Followers:</span><br>
            <!-- <div class="foll-card">
                <a href="./" target="_blank" class="foll-name">Name</a>
            </div> -->
        </div>
    </main>
    <script src="./GIT.js"></script>
    <script src="./main.js"></script>
</body>

</html>
